<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>MENÜ</title>
<style>
  /* ===== Apple HIG · SF Pro · Light (white) · systemBlue ===== */
  :root{
    --blue:#007AFF;
    --bg:#F2F2F7;
    --card:#FFFFFF;
    --label:#000000;
    --secondary:rgba(60,60,67,.60);
    --tertiary:rgba(60,60,67,.30);
    --sep:rgba(60,60,67,.22);
    --fill:#EFEFF4;
    --tint:rgba(0,122,255,.10);
    --imgbg:#FFFFFF;
    --shadow:0 1px 0 rgba(0,0,0,.03);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",system-ui,sans-serif;
    background:transparent;color:var(--label);
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    padding-bottom:60px;letter-spacing:-.01em;
  }
  /* Background café/bakery video + warm scrim for legibility */
  .bgwrap{position:fixed;inset:0;z-index:-2;overflow:hidden;background:#F7F4EF}
  .bgvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .bgwrap::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(247,244,239,.90) 0%,rgba(247,244,239,.52) 24%,rgba(247,244,239,.58) 68%,rgba(247,244,239,.80) 100%)}
  header{background:transparent;padding:30px 20px 18px}
  header h1{font-size:34px;line-height:1.05;font-weight:700;letter-spacing:-.022em}
  header p{color:var(--secondary);font-size:15px;margin-top:6px;font-weight:400}
  /* Liquid Glass — floating translucent nav bar */
  nav{position:sticky;top:10px;z-index:20;margin:10px 12px 2px;padding:7px 8px;border-radius:22px;
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
    border:.5px solid rgba(255,255,255,.7);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.75), 0 6px 22px rgba(0,0,0,.10);
    display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav a{flex:0 0 auto;text-decoration:none;color:var(--secondary);background:transparent;
    padding:7px 15px;border-radius:980px;font-size:14px;font-weight:600;white-space:nowrap;transition:.2s}
  nav a.active{background:var(--blue);color:#fff;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.4), 0 2px 8px rgba(0,122,255,.35)}
  section{padding:26px 16px 0;animation:rise .5s both}
  section h2{font-size:13px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--secondary);margin:0 4px 8px}
  /* Liquid Glass menu cards floating over the video */
  .group{background:rgba(255,255,255,.74);border-radius:14px;overflow:hidden;
    backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);
    border:.5px solid rgba(255,255,255,.65);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.6), 0 6px 20px rgba(60,40,20,.08)}
  .row{display:flex;align-items:center;gap:13px;padding:11px 14px;position:relative;
    cursor:pointer;transition:background .12s,transform .12s;-webkit-user-select:none;user-select:none}
  .row:active{background:var(--fill);transform:scale(.992)}
  .row + .row::before{content:"";position:absolute;top:0;left:71px;right:0;height:.5px;background:var(--sep)}
  .thumb{flex:0 0 auto;width:52px;height:52px;border-radius:12px;background:var(--imgbg);
    border:.5px solid var(--sep);display:flex;align-items:center;justify-content:center;font-size:27px;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .rmid{flex:1 1 auto;min-width:0}
  .rmid .name{font-size:16px;font-weight:600;letter-spacing:-.02em;line-height:1.25}
  .rmid .desc{color:var(--secondary);font-size:13px;margin-top:1px;line-height:1.3;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rend{flex:0 0 auto;display:flex;align-items:center;gap:5px}
  .price{font-size:16px;font-weight:600;color:var(--blue);white-space:nowrap;letter-spacing:-.02em}
  .chev{color:var(--tertiary);font-size:19px;font-weight:600;line-height:1}
  .badge{display:inline-block;font-size:10.5px;font-weight:600;color:var(--blue);background:var(--tint);
    padding:2px 7px;border-radius:6px;margin-left:7px;vertical-align:middle;letter-spacing:0}
  footer{text-align:center;color:var(--tertiary);font-size:12px;padding:30px 16px}
  footer b{color:var(--secondary);font-weight:500}

  /* ===== DETAIL SHEET ===== */
  .overlay{position:fixed;inset:0;z-index:60;display:none}
  .overlay.open{display:block}
  .backdrop{position:absolute;inset:0;opacity:0;transition:opacity .3s ease}
  .overlay.show .backdrop{opacity:1;background:rgba(0,0,0,.32);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
  /* Liquid Glass — translucent sheet material */
  .panel{position:absolute;left:0;right:0;bottom:0;max-height:92vh;
    background:rgba(255,255,255,.82);
    backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
    border-top:.5px solid rgba(255,255,255,.7);
    border-radius:22px 22px 0 0;transform:translateY(100%);
    transition:transform .42s cubic-bezier(.32,.72,0,1);overflow-y:auto;-webkit-overflow-scrolling:touch;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.7), 0 -8px 44px rgba(0,0,0,.22)}
  .overlay.show .panel{transform:translateY(0)}
  .grab{width:40px;height:5px;border-radius:3px;background:var(--tertiary);margin:9px auto 2px}
  .sheetX{position:sticky;top:0;display:flex;justify-content:flex-end;padding:6px 14px 0;z-index:2}
  .sheetX button{width:32px;height:32px;border:.5px solid rgba(255,255,255,.6);border-radius:50%;
    background:rgba(255,255,255,.5);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
    color:var(--secondary);font-size:15px;font-weight:600;cursor:pointer;line-height:1;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.75), 0 2px 8px rgba(0,0,0,.12)}
  .hero{margin:2px 20px 0;height:240px;border-radius:16px;background:var(--imgbg);border:.5px solid var(--sep);
    display:flex;align-items:center;justify-content:center;font-size:92px;overflow:hidden}
  .hero img{width:100%;height:100%;object-fit:contain}
  .sheetbody{padding:18px 22px 40px}
  .sheetbody .stitle{font-size:26px;font-weight:700;letter-spacing:-.022em;line-height:1.1}
  .sheetbody .sprice{font-size:20px;font-weight:700;color:var(--blue);margin-top:4px;letter-spacing:-.02em}
  .sheetbody .sdesc{font-size:16px;line-height:1.45;color:var(--label);margin-top:12px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .tag{font-size:12.5px;font-weight:600;color:var(--blue);background:var(--tint);padding:5px 11px;border-radius:980px}
  .block{margin-top:24px}
  .block h3{font-size:13px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;color:var(--secondary);margin-bottom:12px}
  /* ingredients */
  .ing{display:flex;flex-wrap:wrap;gap:16px 12px}
  .ing .chip{width:62px;display:flex;flex-direction:column;align-items:center;gap:7px;animation:rise .4s both}
  .ing .chip .cimg{width:48px;height:48px;border-radius:50%;background:var(--imgbg);border:.5px solid var(--sep);
    display:flex;align-items:center;justify-content:center;font-size:24px;overflow:hidden;box-shadow:var(--shadow)}
  .ing .chip .cimg img{width:100%;height:100%;object-fit:cover}
  .ing .chip .cname{font-size:11.5px;color:var(--secondary);text-align:center;line-height:1.15;font-weight:500}
  /* keypoints */
  .kp{list-style:none;display:flex;flex-direction:column;gap:9px}
  .kp li{display:flex;gap:10px;font-size:15.5px;line-height:1.4;align-items:flex-start;animation:rise .4s both}
  .kp li .ic{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--tint);color:var(--blue);
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-top:1px}
  .health{background:var(--fill);border-radius:14px;padding:15px 16px;display:flex;gap:12px;animation:rise .4s both}
  .health .lg{flex:0 0 auto;font-size:22px;line-height:1.2}
  .health .ht{font-size:14.5px;line-height:1.5;color:var(--label)}
  .health .ht b{font-weight:600}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

        <div class="health"><div class="lg">🌿</div><div class="ht" id="s_health"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('isim').textContent = MENU.isim;
document.getElementById('slogan').textContent = MENU.slogan;
document.getElementById('fname').textContent = MENU.isim;
document.title = MENU.isim + " · Menü";

const nav = document.getElementById('nav');
const menu = document.getElementById('menu');
function el(t,c,x){const n=document.createElement(t);if(c)n.className=c;if(x!=null)n.textContent=x;return n;}
function imgOrGlyph(container,foto,glyph,alt){
  container.textContent="";
  if(foto){const im=document.createElement('img');im.src=foto;im.alt=alt||"";container.appendChild(im);}
  else container.textContent=glyph||"•";
}

MENU.bolumler.forEach((b,i)=>{
  const id="b"+i;
  const a=el('a',i===0?'active':'',b.ad);a.href="#"+id;nav.appendChild(a);
  const sec=el('section');sec.id=id;sec.style.animationDelay=(i*0.05)+"s";
  sec.appendChild(el('h2',null,b.ad));
  const group=el('div','group');
  b.urunler.forEach(u=>{
    const row=el('div','row');
    const thumb=el('div','thumb');imgOrGlyph(thumb,u.foto,u.img,u.ad);
    const mid=el('div','rmid');
    const name=el('div','name',u.ad);
    if(u.rozet)name.appendChild(el('span','badge',u.rozet));
    mid.appendChild(name);
    if(u.aciklama)mid.appendChild(el('div','desc',u.aciklama));
    const end=el('div','rend');
    end.appendChild(el('div','price',u.fiyat));
    end.appendChild(el('div','chev','›'));
    row.appendChild(thumb);row.appendChild(mid);row.appendChild(end);
    row.addEventListener('click',()=>openSheet(u));
    group.appendChild(row);
  });
  sec.appendChild(group);menu.appendChild(sec);
});

const links=[...nav.querySelectorAll('a')];
const obs=new IntersectionObserver(es=>es.forEach(e=>{
  if(e.isIntersecting){links.forEach(l=>l.classList.toggle('active',l.hash==="#"+e.target.id))}
}),{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll('section').forEach(s=>obs.observe(s));

const overlay=document.getElementById('overlay');
const panel=document.getElementById('panel');
function openSheet(u){
  document.getElementById('s_title').textContent=u.ad;
  document.getElementById('s_price').textContent=u.fiyat;
  document.getElementById('s_desc').textContent=u.aciklama||"";
  imgOrGlyph(document.getElementById('hero'),u.foto,u.img,u.ad);
  const tg=document.getElementById('s_tags');tg.textContent="";
  (u.etiket||[]).forEach(t=>tg.appendChild(el('span','tag',t)));
  const ing=document.getElementById('s_ing');ing.textContent="";
  (u.malzeme||[]).forEach((m,idx)=>{
    const c=el('div','chip');c.style.animationDelay=(idx*0.04)+"s";
    const ci=el('div','cimg');imgOrGlyph(ci,m.foto,m.i,m.a);
    c.appendChild(ci);c.appendChild(el('div','cname',m.a));
    ing.appendChild(c);
  });
  const kp=document.getElementById('s_kp');kp.textContent="";
  (u.oz||[]).forEach((k,idx)=>{
    const li=el('li');li.style.animationDelay=(idx*0.04)+"s";
    li.appendChild(el('span','ic','✓'));li.appendChild(el('span',null,k));kp.appendChild(li);
  });
  renderRich(document.getElementById('s_health'),u.saglik||"");
  panel.scrollTop=0;
  overlay.classList.add('open');
  requestAnimationFrame(()=>requestAnimationFrame(()=>overlay.classList.add('show')));
  document.body.style.overflow='hidden';
}
function closeSheet(){
  overlay.classList.remove('show');
  document.body.style.overflow='';
  setTimeout(()=>overlay.classList.remove('open'),420);
}
function renderRich(node,str){
  node.textContent="";
  const parts=str.split(/(<b>|<\/b>)/);let bold=false;
  parts.forEach(p=>{
    if(p==="<b>"){bold=true;return;}
    if(p==="</b>"){bold=false;return;}
    if(!p)return;
    node.appendChild(bold?el('b',null,p):document.createTextNode(p));
  });
}
document.getElementById('closeBtn').addEventListener('click',closeSheet);
document.getElementById('backdrop').addEventListener('click',closeSheet);
document.addEventListener('keydown',e=>{if(e.key==="Escape"&&overlay.classList.contains('open'))closeSheet();});
</script>
</body>
</html>
